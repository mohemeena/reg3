<h1>Class Search</h1>

<form action="/classoverviews" method="get">

    Dept:
    <input id="deptInput" type="text" name="dept" value="{{ dept }}" autofocus>
    <br>

    Course Number:
    <input id="courseNumInput" type="text" name="number" value="{{ number }}">
    <br>

    Area:   
    <input id="areaInput" type="text" name="area" value="{{ area }}">
    <br>

    Title:
    <input id="titleInput" type="text" name="title" value="{{ title }}">
    <br>

    <input id="submitButton" type="submit" value="Go">
</form>
<br>
